name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull new image on VPS
        run: |
          # Fazer pull da nova imagem no Portainer
          AUTH=$(echo -n '{"username":"jvzanini","password":"${{ secrets.GHCR_TOKEN }}"}' | base64)
          curl -sk -X POST \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "X-Registry-Auth: $AUTH" \
            "${{ secrets.PORTAINER_URL }}/api/endpoints/1/docker/images/create?fromImage=ghcr.io/jvzanini/nexus-roteador-webhook&tag=latest"

      - name: Force update services
        run: |
          # Forçar update dos serviços app e worker para usar a nova imagem
          for SERVICE in nexus-roteador-webhook_app nexus-roteador-webhook_worker; do
            # Buscar service ID e versão
            SERVICE_DATA=$(curl -sk \
              -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
              "${{ secrets.PORTAINER_URL }}/api/endpoints/1/docker/services" | \
              python3 -c "import sys,json; svcs=json.load(sys.stdin); [print(json.dumps({'id':s['ID'],'version':s['Version']['Index'],'spec':s['Spec']})) for s in svcs if s['Spec']['Name']=='$SERVICE']")

            if [ -n "$SERVICE_DATA" ]; then
              SVC_ID=$(echo "$SERVICE_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
              SVC_VERSION=$(echo "$SERVICE_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['version'])")
              SVC_SPEC=$(echo "$SERVICE_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['spec']))")

              # Update com forceUpdate para recriar containers
              UPDATED_SPEC=$(echo "$SVC_SPEC" | python3 -c "
          import sys,json
          spec = json.load(sys.stdin)
          spec['TaskTemplate']['ForceUpdate'] = spec['TaskTemplate'].get('ForceUpdate', 0) + 1
          print(json.dumps(spec))
          ")

              curl -sk -X POST \
                -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "$UPDATED_SPEC" \
                "${{ secrets.PORTAINER_URL }}/api/endpoints/1/docker/services/$SVC_ID/update?version=$SVC_VERSION"

              echo "Updated $SERVICE"
            fi
          done
